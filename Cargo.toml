[package]
name = "paqus"
version = "0.1.2"
edition = "2024"
description = "Devnet core primitives for the Paqus proof-of-work blockchain."
readme = "README.md"
repository = "https://github.com/paqusprotocol/paqus"
license = "MIT"
keywords = ["blockchain", "pow", "devnet", "quantum", "cryptography"]
categories = ["cryptography::cryptocurrencies"]

[dependencies]
sha3 = "0.12.0"
ml_dsa = { package = "ml-dsa", version = "0.1.1" }
hex = "0.4"
borsh = { version = "1.5", features = ["derive"] }
serde = { version = "1", features = ["derive"] }
argon2 = "0.6.0-rc.8"
sled = "0.34"
